<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Pass - Sreenidhi University Founder's Day</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #15347e;
            --royal: #2f53d7;
            --page-top: #f7f9fe;
            --page-bottom: #ecf1fb;
            --card: #ffffff;
            --ink: #17233c;
            --muted: #6a7894;
            --border: rgba(23, 35, 60, 0.12);
            --shadow: 0 24px 60px rgba(27, 44, 94, 0.1);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: 
                radial-gradient(circle at top left, rgba(48, 73, 216, 0.08), transparent 35%),
                radial-gradient(circle at bottom right, rgba(25, 57, 143, 0.06), transparent 35%),
                linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
            min-height: 100vh;
            color: var(--ink);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .pass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 580px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .pass-header {
            background: linear-gradient(180deg, rgba(241, 246, 255, 0.5), rgba(255, 255, 255, 0.8));
            border-bottom: 1px solid var(--border);
            padding: 1.5rem;
            text-align: center;
        }
        .pass-header img {
            height: 48px;
            margin-bottom: 0.75rem;
        }
        .pass-header h4 {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--navy);
            font-weight: 700;
            margin: 0;
        }
        .pass-body {
            padding: 2rem;
            text-align: center;
        }
        .pass-image-container {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(21, 52, 126, 0.08);
            box-shadow: 0 8px 24px rgba(27, 44, 94, 0.04);
            margin-bottom: 1.5rem;
            background-color: #fbfcff;
        }
        .pass-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        .btn-download {
            background: linear-gradient(135deg, #3049d8 0%, #3d56df 100%);
            border: 0;
            color: #ffffff;
            font-weight: 700;
            border-radius: 12px;
            padding: 0.9rem;
            width: 100%;
            box-shadow: 0 10px 20px rgba(48, 73, 216, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(48, 73, 216, 0.22);
            color: #ffffff;
        }
        .btn-download:active {
            transform: translateY(0px) scale(0.97);
        }
        .pass-footer {
            background-color: #f8fafc;
            border-top: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="pass-card">
        <div class="pass-header">
            <img src="{{ url_for('static', filename='images/sreenidhi-university-logo.png') }}" alt="SNIST Logo">
            <h4>Founder's Day Invitation Pass</h4>
        </div>
        <div class="pass-body">
            <p class="text-muted mb-4">Dear <strong>{{ guest.guest_name }}</strong>, show this entry pass at the gate for check-in.</p>
            <div class="pass-image-container">
                <img src="{{ url_for('static', filename='barcodes/' + guest.qr_code + '.png') }}" alt="Official Invitation Card">
            </div>
            <a href="{{ url_for('static', filename='barcodes/' + guest.qr_code + '.png') }}" download="Pass_{{ guest.qr_code }}.png" class="btn btn-download">
                <i class="bi bi-download me-2"></i>Download Pass
            </a>
        </div>
        <div class="pass-footer">
            Sreenidhi University, Yamnampet, Ghatkesar, Hyderabad - 501302
        </div>
    </div>
</body>
</html>
