version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always

  web:
    build: .
    ports:
      - "8888:8000"
    environment:
      - SECRET_KEY=snist-docker-secret-key-987654321
      - DATABASE_URL=mysql+pymysql://root:rootpassword@mariadb-local:3306/founder_day
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USE_TLS=True
      - SMTP_USER=Invitation@suh.edu.in
      - SMTP_PASSWORD=qxdqxqkyiomhgakq
      - SMTP_SENDER=Invitation@suh.edu.in
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SMTP_BATCH_LIMIT=100
      - SMTP_RATE_DELAY=1.0
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-production}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-https://103.229.250.150/unified/v2/send}
      - WHATSAPP_CLIENT_ID=${WHATSAPP_CLIENT_ID}
      - WHATSAPP_CLIENT_PASSWORD=${WHATSAPP_CLIENT_PASSWORD}
      - WHATSAPP_TEMPLATE_ID=${WHATSAPP_TEMPLATE_ID:-1776508}
      - WHATSAPP_FROM_NUMBER=${WHATSAPP_FROM_NUMBER}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_RATE_DELAY=${WHATSAPP_RATE_DELAY:-1.0}
      - WHATSAPP_BATCH_LIMIT=${WHATSAPP_BATCH_LIMIT:-100}
    volumes:
      - ./static/barcodes:/app/static/barcodes
      - ./logs:/app/logs
      - db-data:/app/instance
    depends_on:
      - redis
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: .
    command: celery -A app.celery worker --loglevel=info
    environment:
      - SECRET_KEY=snist-docker-secret-key-987654321
      - DATABASE_URL=mysql+pymysql://root:rootpassword@mariadb-local:3306/founder_day
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USE_TLS=True
      - SMTP_USER=Invitation@suh.edu.in
      - SMTP_PASSWORD=qxdqxqkyiomhgakq
      - SMTP_SENDER=Invitation@suh.edu.in
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SMTP_BATCH_LIMIT=100
      - SMTP_RATE_DELAY=1.0
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-production}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-https://103.229.250.150/unified/v2/send}
      - WHATSAPP_CLIENT_ID=${WHATSAPP_CLIENT_ID}
      - WHATSAPP_CLIENT_PASSWORD=${WHATSAPP_CLIENT_PASSWORD}
      - WHATSAPP_TEMPLATE_ID=${WHATSAPP_TEMPLATE_ID:-1776508}
      - WHATSAPP_FROM_NUMBER=${WHATSAPP_FROM_NUMBER}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_RATE_DELAY=${WHATSAPP_RATE_DELAY:-1.0}
      - WHATSAPP_BATCH_LIMIT=${WHATSAPP_BATCH_LIMIT:-100}
    volumes:
      - ./static/barcodes:/app/static/barcodes
      - ./logs:/app/logs
      - db-data:/app/instance
    depends_on:
      - redis
    restart: always

volumes:
  db-data:
